<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawab ZADA HACKER DB</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #ff0041;
            --bg: #050505;
            --card-bg: rgba(15, 15, 20, 0.9);
            --border: rgba(255, 0, 65, 0.3);
            --text: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a050a 0%, #050505 100%);
        }

        /* Lock Screen */
        #lockScreen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        .lock-card {
            background: var(--card-bg);
            border: 2px solid var(--primary);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 65, 0.2);
            max-width: 350px;
        }

        .btn-unlock {
            background: #25D366;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        /* Main UI */
        .header {
            text-align: center;
            padding: 50px 20px;
        }

        .logo-area i {
            font-size: 60px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 3px;
            margin: 15px 0;
            font-size: 28px;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .input-box {
            position: relative;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 15px;
            display: flex;
            overflow: hidden;
            transition: 0.3s;
        }

        input {
            background: transparent;
            border: none;
            padding: 15px;
            color: white;
            width: 100%;
            outline: none;
            font-size: 16px;
        }

        .btn-search {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0 25px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Results Card */
        #resultArea {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
            display: none;
        }

        .data-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            margin-bottom: 20px;
        }

        .data-card::before {
            content: 'SYSTEM LOG';
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--primary);
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 5px;
        }

        .info-row {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
        }

        .label { color: #888; font-size: 14px; }
        .value { color: var(--primary); font-weight: bold; }

        .map-container {
            width: 100%;
            height: 250px;
            border-radius: 15px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 15px;
        }

        .not-found {
            text-align: center;
            color: #ff4444;
            padding: 20px;
            border: 1px dashed #ff4444;
            border-radius: 15px;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="lockScreen">
        <div class="lock-card">
            <i class="fas fa-user-shield" style="font-size: 50px; color: var(--primary);"></i>
            <h2>ACCESS DENIED</h2>
            <p>Follow my WhatsApp channel to unlock Sim Database Tool.</p>
            <button onclick="unlockTool()" class="btn-unlock">
                <i class="fab fa-whatsapp"></i> FOLLOW TO UNLOCK
            </button>
        </div>
    </div>

    <div class="header">
        <div class="logo-area">
            <i class="fas fa-user-secret"></i>
        </div>
        <h1>NAWAB ZADA HACKER DB</h1>
        <p style="color: #888;">PREMIUM SIM-DATABASE SYSTEM 2026</p>
    </div>

    <div class="search-container">
        <div class="input-box">
            <input type="text" id="targetInput" placeholder="Enter Number (3xxxxxxxxx) or CNIC">
            <button class="btn-search" onclick="startSearch()">SCAN</button>
        </div>
    </div>

    <div id="resultArea"></div>

    <footer>
        CREATED BY NAWAB ZADA HACKER🙌🦅 
    </footer>

    <script>
        function unlockTool() {
            window.open('https://whatsapp.com/channel/0029VbB47ttDDmFNztpnZf2m', '_blank');
            setTimeout(() => { $('#lockScreen').fadeOut(); }, 5000);
        }

        function displayData(data, query) {
            // Normalizing data from different API structures
            const name = data.full_name || data.Name || data.NAME || 'N/A';
            const phone = data.phone || data.Mobile || data.NUMBER || query;
            const cnic = data.cnic || data.CNIC || 'N/A';
            const address = data.address || data.Address || "Pakistan";
            
            const mapUrl = `https://maps.google.com/maps?q=${encodeURIComponent(address)}&t=k&z=13&ie=UTF8&iwloc=&output=embed`;

            $('#resultArea').html(`
                <div class="data-card">
                    <div class="info-row"><span class="label">NAME:</span> <span class="value">${name}</span></div>
                    <div class="info-row"><span class="label">NUMBER:</span> <span class="value">${phone}</span></div>
                    <div class="info-row"><span class="label">CNIC:</span> <span class="value">${cnic}</span></div>
                    <div class="info-row"><span class="label">ADDRESS:</span> <span class="value">${address}</span></div>
                    
                    <div style="margin-top:20px; font-weight:bold; font-size:14px; color:var(--primary);">
                        <i class="fas fa-map-marker-alt"></i> SATELLITE LOCATION:
                    </div>
                    <div class="map-container">
                        <iframe width="100%" height="100%" frameborder="0" style="border:0" src="${mapUrl}" allowfullscreen></iframe>
                    </div>
                </div>
            `).fadeIn();
        }

        async function startSearch() {
            const query = $('#targetInput').val().trim();
            if(!query) return alert("Please enter something!");

            $('#resultArea').html('<div style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> Initializing Deep Scan...</div>').fadeIn();

            try {
                // --- TRY API 1 (famofc) ---
                const resp1 = await fetch(`https://famofc.site/api/database.php?q=${query}`);
                const res1 = await resp1.json();

                if(res1.success && res1.data && res1.data.records && res1.data.records.length > 0) {
                    displayData(res1.data.records[0], query);
                } else {
                    // --- FAILOVER: TRY API 2 (Nawab Zada) ---
                    $('#resultArea').html('<div style="text-align:center;"><i class="fas fa-sync fa-spin"></i> API 1 Empty. Checking Backup Database...</div>');
                    
                    const resp2 = await fetch(`https://wasifali-sim-info.netlify.app/api/search?phone=${query}`);
                    const res2 = await resp2.json();

                    if(res2 && res2.records && res2.records.length > 0) {
                        displayData(res2.records[0], query);
                    } else {
                        $('#resultArea').html('<div class="not-found"><i class="fas fa-times-circle"></i> DATA NOT FOUND IN ALL DATABASES</div>');
                    }
                }
            } catch (error) {
                // If main try block fails, try backup once more as safety
                try {
                    const resp2 = await fetch(`https://wasifali-sim-info.netlify.app/api/search?phone=${query}`);
                    const res2 = await resp2.json();
                    if(res2 && res2.records && res2.records.length > 0) {
                        displayData(res2.records[0], query);
                    } else {
                        $('#resultArea').html('<div class="not-found">SERVER ERROR OR NO DATA FOUND</div>');
                    }
                } catch (e) {
                    $('#resultArea').html('<div class="not-found">DATA NOT FOUND TRY OTHER NUMBER</div>');
                }
            }
        }
    </script>
</body>
    </html>
