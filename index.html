<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nawab ZADA HACKER DB</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap');

        :root {
            --primary: #ff0041;
            --bg: #050505;
            --card-bg: rgba(15, 15, 20, 0.9);
            --border: rgba(255, 0, 65, 0.3);
            --text: #ffffff;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a050a 0%, #050505 100%);
        }

        /* Lock Screen */
        #lockScreen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
        }

        .lock-card {
            background: var(--card-bg);
            border: 2px solid var(--primary);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 65, 0.2);
            max-width: 350px;
        }

        .btn-unlock {
            background: #25D366;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        /* Main UI */
        .header {
            text-align: center;
            padding: 50px 20px;
        }

        .logo-area i {
            font-size: 60px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 3px;
            margin: 15px 0;
            font-size: 28px;
        }

        .search-container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .input-box {
            position: relative;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 15px;
            display: flex;
            overflow: hidden;
            transition: 0.3s;
        }

        .input-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 0, 65, 0.3);
        }

        input {
            background: transparent;
            border: none;
            padding: 15px;
            color: white;
            width: 100%;
            outline: none;
            font-size: 16px;
        }

        .btn-search {
            background: var(--primary);
            border: none;
            color: white;
            padding: 0 25px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Results Card */
        #resultArea {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
            display: none;
        }

        .data-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            position: relative;
        }

        .data-card::before {
            content: 'SYSTEM LOG';
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--primary);
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 5px;
        }

        .info-row {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 12px 0;
            display: flex;
            justify-content: space-between;
        }

        .label { color: #888; font-size: 14px; }
        .value { color: var(--primary); font-weight: bold; }

        .not-found {
            text-align: center;
            color: #ff4444;
            padding: 20px;
            border: 1px dashed #ff4444;
            border-radius: 15px;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>

    <div id="lockScreen">
        <div class="lock-card">
            <i class="fas fa-user-shield" style="font-size: 50px; color: var(--primary);"></i>
            <h2>ACCESS DENIED</h2>
            <p>Follow my WhatsApp channel to unlock Nawab ZADA HACKER DB.</p>
            <button onclick="unlockTool()" class="btn-unlock">
                <i class="fab fa-whatsapp"></i> FOLLOW TO UNLOCK
            </button>
        </div>
    </div>

    <div class="header">
        <div class="logo-area">
            <i class="fas fa-user-secret"></i>
        </div>
        <h1>NAWAB ZADA HACKER DB</h1>
        <p style="color: #888;">PREMIUM MULTI-DATABASE SYSTEM 2026</p>
    </div>

    <div class="search-container">
        <div class="input-box">
            <input type="text" id="targetInput" placeholder="Enter Number (3xxxxxxxxx) or CNIC">
            <button class="btn-search" onclick="startSearch()">SCAN</button>
        </div>
    </div>

    <div id="resultArea">
        </div>

    <footer>
        CREATED BY NAWAB ZADA HACKER🙌🦅 
    </footer>

    <script>
        // Unlock Logic
        function unlockTool() {
            window.open('https://whatsapp.com/channel/0029VbB47ttDDmFNztpnZf2m', '_blank');
            setTimeout(() => {
                $('#lockScreen').fadeOut();
            }, 5000); // 5 seconds wait
        }

        async function startSearch() {
            const query = $('#targetInput').val().trim();
            if(!query) return alert("Please enter something!");

            $('#resultArea').html('<div style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> Searching...</div>').fadeIn();

            try {
                const response = await fetch(`https://famofc.site/api/database.php?q=${query}`);
                const res = await response.json();

                if(res.success && res.data.records.length > 0) {
                    const data = res.data.records[0];
                    $('#resultArea').html(`
                        <div class="data-card">
                            <div class="info-row"><span class="label">NAME:</span> <span class="value">${data.full_name || 'N/A'}</span></div>
                            <div class="info-row"><span class="label">NUMBER:</span> <span class="value">${data.phone || query}</span></div>
                            <div class="info-row"><span class="label">CNIC:</span> <span class="value">${data.cnic || 'N/A'}</span></div>
                            <div class="info-row"><span class="label">ADDRESS:</span> <span class="value">${data.address || 'N/A'}</span></div>
                        </div>
                    `);
                } else {
                    $('#resultArea').html('<div class="not-found"><i class="fas fa-times-circle"></i> DATA NOT FOUND IN DATABASE</div>');
                }
            } catch (error) {
                $('#resultArea').html('<div class="not-found">SERVER ERROR! TRY AGAIN</div>');
            }
        }
    </script>
</body>
  </html>
